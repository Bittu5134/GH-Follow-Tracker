<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title id="page-title">User Stats | GH Follow Tracker</title>
		<style>
			:root {
				--color-canvas-default: #0d1117;
				--color-canvas-subtle: #010409;
				--color-border-default: #30363d;
				--color-fg-default: #c9d1d9;
				--color-fg-muted: #8b949e;
				--color-btn-bg: #21262d;
				--color-btn-border: rgba(240, 246, 252, 0.1);
				--color-btn-primary-bg: #238636;
				--color-accent-fg: #58a6ff;
				--color-attention-subtle: rgba(187, 128, 9, 0.15);
				--color-attention-fg: #d29922;
				--radius: 12px;
				--font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
			}

			[data-theme='light'] {
				--color-canvas-default: #ffffff;
				--color-canvas-subtle: #f6f8fa;
				--color-border-default: #d0d7de;
				--color-fg-default: #24292f;
				--color-fg-muted: #57606a;
				--color-btn-bg: #f6f8fa;
				--color-btn-border: rgba(27, 31, 36, 0.15);
				--color-btn-primary-bg: #2da44e;
				--color-accent-fg: #0969da;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				transition: cubic-bezier(0.62, 1, 0.84, 0.97) 0.75s;
			}

			body {
				font-family: var(--font-stack);
				background-color: var(--color-canvas-default);
				color: var(--color-fg-default);
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				padding: 0;
			}

			.profile-card {
				width: 100%;
				max-width: 600px;
				background: var(--color-canvas-subtle);
				border: 1px solid var(--color-border-default);
				border-radius: var(--radius);
				padding: 40px;
				text-align: center;
				box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
			}

			header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 32px;
			}

			.logo {
				font-weight: 600;
				text-decoration: none;
				color: var(--color-fg-default);
				font-size: 14px;
			}

			.user-info {
				margin-bottom: 16px;
			}

			.user-info a {
				font-size: 1.5em;
				margin-bottom: 4px;
				text-decoration: none;
				color: currentColor;
			}

			.user-info p {
				color: var(--color-fg-muted);
				font-size: 14px;
			}

			/* Warning Box */
			.warning-box {
				display: none;
				background: var(--color-attention-subtle);
				border: 1px solid var(--color-attention-fg);
				color: var(--color-attention-fg);
				padding: 12px;
				border-radius: 6px;
				font-size: 13px;
				margin-bottom: 24px;
				line-height: 1.4;
			}

			.svg-display {
				margin: 24px 0;
				border-radius: 8px;
				overflow: hidden;
				min-height: 150px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.svg-display svg {
				width: 100%;
				height: auto;
				display: block;
			}

			/* FLUID BUTTONS */
			.btn-group {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				margin-top: 32px;
			}

			button,
			.btn {
				cursor: pointer;
				padding: 0.5em;
				font-size: 0.9em;
				font-weight: 600;
				border-radius: 6px;
				border: 1px solid var(--color-btn-border);
				background: var(--color-btn-bg);
				color: var(--color-fg-default);
				text-decoration: none;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				flex: 1 1 calc(50% - 10px);
			}

			button.primary {
				background: var(--color-btn-primary-bg);
				color: white;
				border: none;
				flex: 1 1 100%;
			}

			/* Mobile adjustment */
			@media (max-width: 480px) {
				button,
				.btn {
					flex: 1 1 100%;
				}

				.profile-card {
					padding: 24px;
				}
			}

			.footer-links {
				margin-top: 24px;
				display: flex;
				justify-content: center;
				gap: 16px;
				font-size: 12px;
			}

			.footer-links a {
				color: var(--color-accent-fg);
				text-decoration: none;
			}
		</style>
	</head>

	<body data-theme="dark">
		<div class="profile-card">
			<header>
				<a href="/" class="logo">📈 Follow Tracker</a>
				<button id="themeToggle" style="padding: 4px 8px; font-size: 12px; flex: 0 1 auto">🌙 Dark</button>
			</header>

			<div class="user-info">
				<a id="display-name">Loading...</a>
			</div>

			<div id="tracking-warning" class="warning-box">
				⚠️ <b>Note:</b> This user is not yet tracked. Please <b>star the repository</b> to opt into history tracking for this account!
			</div>

			<div class="svg-display" id="svg-container">
				<p style="color: var(--color-fg-muted)">Generating Chart...</p>
			</div>

			<div class="btn-group">
				<button class="primary" id="copyMarkdown">📋 Copy Markdown</button>
				<a href="/editor" class="btn">🎨 Editor</a>
				<a href="https://github.com/Bittu5134/GH-Follow-Tracker" target="_blank" class="btn">⭐ Star Repo</a>
			</div>

			<div class="footer-links">
				<a href="/dashboard">Dashboard</a>
				<span>•</span>
				<a href="/">Home</a>
			</div>
		</div>

		<script type="module">
			import { THEMES, DEFAULT_STATE } from '/config.js';
			import { generateChartSVG } from '/generate.js';

			const pathParts = window.location.pathname.split('/');
			const username = pathParts[2];
			let state = { ...DEFAULT_STATE, username };

			const svgContainer = document.getElementById('svg-container');
			const themeBtn = document.getElementById('themeToggle');
			const warningBox = document.getElementById('tracking-warning');

			function render() {
				if (!state.dataset) return;
				const pageTheme = document.body.getAttribute('data-theme');

				// Fix: Create a clean options object for the generator
				// We strip existing colors so the theme colors can take over
				const options = {
					...state,
					theme: pageTheme === 'light' ? 'light' : 'default',
				};

				delete options.col_bg;
				delete options.col_line;
				delete options.col_area;
				delete options.col_title;
				delete options.col_sub;
				delete options.col_border;

				svgContainer.innerHTML = generateChartSVG(options);
			}

			async function fetchGithubData(name) {
				try {
					const nameLower = name.toLowerCase();
					const rawUrl = `https://raw.githubusercontent.com/Bittu5134/GH-Follow-Tracker/refs/heads/meta/data/user/${nameLower}.json`;
					const res = await fetch(rawUrl);

					if (res.ok) {
						state.dataset = await res.json();
						warningBox.style.display = 'none';
					} else {
						// FALLBACK + WARNING
						const apiRes = await fetch(`https://api.github.com/users/${name}`);
						if (!apiRes.ok) throw new Error('User not found');

						const userData = await apiRes.json();
						const now = new Date().toISOString();
						state.dataset = {
							username: userData.login,
							createdAt: userData.created_at,
							history: [{ timestamp: now, followerCount: userData.followers }],
						};
						warningBox.style.display = 'block';
					}

					document.getElementById('display-name').innerText = `@${state.dataset.username.toLowerCase()}`;
					document.getElementById('display-name').href = `https://github.com/${state.dataset.username.toLowerCase()}`;
					document.getElementById('page-title').innerText = `${state.dataset.username}'s Follow History`;

					render();
				} catch (e) {
					svgContainer.innerHTML = `<p style="color: #cf222e">Error: ${e.message}</p>`;
				}
			}

			function toggleUI(mode) {
				const current = document.body.getAttribute('data-theme');
				const next = mode || (current === 'light' ? 'dark' : 'light');
				document.body.setAttribute('data-theme', next);
				themeBtn.innerText = next === 'dark' ? '🌙 Dark' : '☀️ Light';
				render();
			}

			themeBtn.onclick = () => toggleUI();
			if (window.matchMedia('(prefers-color-scheme: light)').matches) toggleUI('light');
			fetchGithubData(username);

			document.getElementById('copyMarkdown').onclick = () => {
				const baseUrl = window.location.origin;
				const darkSvgUrl = `${baseUrl}/user/${username}.svg?theme=default`;
				const markdown = `[![${username}'s Stats](${darkSvgUrl})](${window.location.href})`;
				navigator.clipboard.writeText(markdown).then(() => {
					const btn = document.getElementById('copyMarkdown');
					btn.innerText = '✅ Copied!';
					setTimeout(() => (btn.innerText = '📋 Copy Markdown Code'), 2000);
				});
			};
		</script>
	</body>
</html>
