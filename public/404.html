<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>404 | Follow Tracker</title>
		<style>
			:root {
				--color-canvas-default: #0d1117;
				--color-canvas-subtle: #010409;
				--color-border-default: #30363d;
				--color-fg-default: #c9d1d9;
				--color-fg-muted: #8b949e;
				--color-accent-fg: #58a6ff;
				--font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
			}

			body {
				font-family: var(--font-stack);
				background-color: var(--color-canvas-default);
				color: var(--color-fg-default);
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100vh;
				text-align: center;
				padding: 20px;
			}

			.error-container {
				width: 400px;
				max-width: min(90vw, 400px);
				padding: 40px;
				border: 1px solid var(--color-border-default);
				background: var(--color-canvas-subtle);
				border-radius: 12px;
			}

			h1 {
				font-size: 64px;
				margin-bottom: 16px;
				color: var(--color-fg-muted);
			}
			p {
				margin-bottom: 24px;
				line-height: 1.6;
			}

			.timer-circle {
				font-size: 24px;
				font-weight: bold;
				color: var(--color-accent-fg);
				display: inline-block;
				width: 50px;
				height: 50px;
				line-height: 50px;
				border: 2px solid var(--color-accent-fg);
				border-radius: 50%;
				margin-bottom: 16px;
			}

			a {
				color: var(--color-accent-fg);
				text-decoration: none;
				font-weight: 600;
			}
			a:hover {
				text-decoration: underline;
			}
		</style>
	</head>
	<body>
		<div class="error-container">
			<h1>404</h1>
			<p>This page doesn't exist.</p>
			<div class="timer-circle" id="countdown">4</div>
			<p>
				Redirecting to the <br />
				<a href="https://github.com/Bittu5134/GH-Follow-Tracker">GitHub Repository</a>...
			</p>
		</div>

		<script>
			let seconds = 4;
			const display = document.getElementById('countdown');
			const repoUrl = 'https://github.com/Bittu5134/GH-Follow-Tracker';

			const interval = setInterval(() => {
				seconds--;
				display.innerText = seconds;
				if (seconds <= 0) {
					clearInterval(interval);
					window.location.href = repoUrl;
				}
			}, 1000);
		</script>
	</body>
</html>
